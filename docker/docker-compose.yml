version: '3.8'

services:
  fluxencrypt:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: threatflux/fluxencrypt:latest
    container_name: fluxencrypt
    volumes:
      - ./data:/data
      - ./keys:/keys:ro
    environment:
      - RUST_LOG=info
      - FLUX_CONFIG_PATH=/data/config.toml
    command: ["--help"]
    restart: unless-stopped

  fluxencrypt-alpine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.alpine
    image: threatflux/fluxencrypt:alpine
    container_name: fluxencrypt-alpine
    volumes:
      - ./data:/data
      - ./keys:/keys:ro
    environment:
      - RUST_LOG=info
      - FLUX_CONFIG_PATH=/data/config.toml
    command: ["--version"]
    restart: unless-stopped

volumes:
  data:
    driver: local
  keys:
    driver: local
